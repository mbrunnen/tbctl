repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: readme-drift
        name: README command drift-check
        entry: uv run python -m pytest tests/test_readme.py -q
        language: system
        pass_filenames: false
        files: '(README\.md|tbctl/.*\.py|tests/(readme_check|test_readme)\.py)$'
